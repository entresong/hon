<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>魂</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#15120e; font-family:Georgia,serif; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* ===== 리니지풍 상태창 ===== */
  #statwin {
    position:absolute; top:10px; left:10px; width:208px; display:none;
    background:linear-gradient(#241d14,#1a140d);
    border:2px solid #6e5430; border-radius:3px;
    box-shadow: inset 0 0 0 1px #0c0a06, 0 2px 8px rgba(0,0,0,0.6);
    padding:8px 10px 9px; color:#d8c8a8; font-size:12px; pointer-events:none;
  }
  #statwin .nm { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  #statwin .nm b { color:#e8d8b8; font-weight:normal; font-size:14px; letter-spacing:1px; }
  #statwin .nm span { color:#c9a24b; font-size:11px; }
  .gauge { position:relative; height:14px; background:#0c0a06; border:1px solid #3a2f20;
    border-radius:2px; margin-bottom:4px; overflow:hidden; }
  .gauge > .fill { position:absolute; inset:0; transform-origin:left; }
  .gauge > .txt { position:absolute; inset:0; text-align:center; font-size:10px; line-height:14px;
    color:#f0e6d0; text-shadow:0 1px 2px #000; letter-spacing:1px; }
  #hpf { background:linear-gradient(#c14b3a,#7e2a1e); }
  #mpf { background:linear-gradient(#3f6da8,#23406e); }
  #expw { margin-bottom:5px; }
  #expf { background:linear-gradient(#d8c050,#9a842c); }
  #statwin .stat2 { display:flex; justify-content:space-between; font-size:11px; color:#8a7d63; margin-bottom:5px; }
  #statwin .stat2 b { color:#cdbb8c; font-weight:normal; }
  #statwin .soul { display:flex; justify-content:space-between; font-size:11px; color:#8a7d63; }
  #statwin .soul b { color:#c9a24b; font-weight:normal; }

  /* ===== 장비/상점 버튼 ===== */
  #btns { position:absolute; right:10px; bottom:60px; display:flex; flex-direction:column; gap:8px; z-index:5; }
  .gbtn { width:54px; height:54px; border-radius:6px; background:linear-gradient(#2c261c,#1a140d);
    border:2px solid #6e5430; color:#c9a24b; font-family:Georgia,serif; font-size:13px; letter-spacing:1px;
    box-shadow: inset 0 0 0 1px #0c0a06, 0 2px 6px rgba(0,0,0,0.6); cursor:pointer; }
  .gbtn.on { border-color:#c9a24b; color:#f0dc8c; }

  /* ===== 장비창 / 상점창 ===== */
  .win { position:absolute; inset:0; display:none; z-index:8; }
  .win .backdrop { position:absolute; inset:0; background:rgba(8,6,4,0.55); }
  .win .panel { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(340px,92vw); max-height:84vh; overflow-y:auto;
    background:linear-gradient(#241d14,#1a140d); border:2px solid #6e5430; border-radius:4px;
    box-shadow: inset 0 0 0 1px #0c0a06, 0 4px 18px rgba(0,0,0,0.7);
    padding:12px 14px 16px; color:#d8c8a8; font-size:12px; }
  .win .ttl { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .win .ttl b { font-size:16px; color:#e8d8b8; font-weight:normal; letter-spacing:2px; }
  .win .x { cursor:pointer; color:#8a7d63; font-size:18px; padding:0 6px; }
  .slot { border-top:1px solid #3a2f20; padding:8px 0 3px; }
  .slot .sh { color:#c9a24b; font-size:11px; margin-bottom:5px; letter-spacing:1px; }
  .item { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:5px 7px;
    margin-bottom:4px; background:#1c160e; border:1px solid #322820; border-radius:3px; }
  .item.eq { border-color:#c9a24b; background:#2a2114; }
  .item .nm2 { color:#e0d2b0; }
  .item .st { color:#8a7d63; font-size:10px; margin-left:6px; }
  .item .empty { color:#6a5f4a; }
  .item button { flex:none; background:#2c261c; border:1px solid #6e5430; color:#c9a24b; font-family:Georgia,serif;
    font-size:11px; padding:4px 9px; border-radius:3px; cursor:pointer; }
  .item button:disabled { opacity:0.4; cursor:default; }
  .shopbal { text-align:right; color:#c9a24b; font-size:11px; margin-bottom:6px; }
  .shopbal b { color:#e8d8b8; font-weight:normal; }

  #msg { position:absolute; bottom:24px; left:0; right:0; text-align:center; color:#c9a24b;
    font-size:14px; text-shadow:0 1px 3px #000; pointer-events:none; }

  #setup { position:absolute; inset:0; background:rgba(10,8,5,0.95); display:flex; flex-direction:column;
    align-items:center; justify-content:center; color:#d8c8a8; padding:24px; z-index:10; text-align:center; }
  #setup h1 { font-size:56px; color:#c9a24b; font-weight:normal; margin-bottom:4px; }
  #setup .tt { font-size:12px; color:#8a7d63; letter-spacing:4px; margin-bottom:22px; }
  #setup input { width:280px; padding:10px; margin-bottom:8px; background:#221d16; border:1px solid #3a2f20;
    color:#d8c8a8; font-family:Georgia,serif; font-size:13px; border-radius:3px; text-align:center; }
  #setup button { background:#2c261c; border:1px solid #c9a24b; color:#c9a24b; font-family:Georgia,serif;
    font-size:15px; letter-spacing:4px; padding:11px 34px; cursor:pointer; border-radius:3px; margin-top:6px; }
  #err { color:#a83a2f; font-size:12px; margin-top:8px; min-height:16px; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="statwin">
  <div class="nm"><b id="who">—</b><span>Lv <span id="lv">1</span></span></div>
  <div class="gauge"><div class="fill" id="hpf"></div><div class="txt" id="hpt">HP 60 / 60</div></div>
  <div class="gauge"><div class="fill" id="mpf"></div><div class="txt" id="mpt">MP 30 / 30</div></div>
  <div class="gauge" id="expw"><div class="fill" id="expf"></div><div class="txt" id="expt">EXP 0 / 12</div></div>
  <div class="stat2"><span>공격 <b id="atkv">7</b></span><span>방어 <b id="defv">0</b></span></div>
  <div class="soul"><span>접속 <span id="count">1</span>명</span><span>魂 <b id="soulv">0</b></span></div>
</div>

<div id="msg"></div>

<div id="btns">
  <button class="gbtn" id="eqBtn" onclick="toggleWin('eqwin')">장비</button>
  <button class="gbtn" id="shopBtn" onclick="toggleWin('shopwin')">상점</button>
</div>

<div class="win" id="eqwin">
  <div class="backdrop" onclick="closeWins()"></div>
  <div class="panel">
    <div class="ttl"><b>장비</b><span class="x" onclick="closeWins()">✕</span></div>
    <div id="eqbody"></div>
  </div>
</div>

<div class="win" id="shopwin">
  <div class="backdrop" onclick="closeWins()"></div>
  <div class="panel">
    <div class="ttl"><b>마을 상점</b><span class="x" onclick="closeWins()">✕</span></div>
    <div class="shopbal">보유 <b id="shopbal">0</b> 魂</div>
    <div id="shopbody"></div>
  </div>
</div>

<div id="setup">
  <h1>魂</h1>
  <div class="tt">베어라, 거두어라, 오르라</div>
  <input id="nick" placeholder="그대의 이름" maxlength="10" />
  <button onclick="enter()">세계에 들어선다</button>
  <div id="err"></div>
</div>

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
function fit(){ cv.width=innerWidth*devicePixelRatio; cv.height=innerHeight*devicePixelRatio;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
addEventListener('resize', fit); fit();

let ws=null, myId=null, WORLD=1600;
let prevState=null, currState=null, currAt=0, prevAt=0;
const me = { x:0, y:0, tx:null, ty:null, known:false, attackId:null };
const SPEED = 170;
const effects = []; // {kind, id, start, level}

// ===== 캐릭터 애니메이션 상태 (클라 표현 전용, 서버 무관) =====
const SWING_MS=280, HURT_MS=320, HIT_MS=200, ATTACK_CD=600, ATK_RANGE=46;
const walkInfo=new Map(), face=new Map(), swingFx=new Map(), hurtFx=new Map(), monFx=new Map();
let myLastSwing=0;
function prune(map, ids){ for(const k of map.keys()) if(!ids.has(k)) map.delete(k); }

// ===== 사운드: 외부 파일 없이 Web Audio로 합성 (첫 입력에 활성화) =====
let actx=null;
function initAudio(){
  try{ if(!actx){ const AC=window.AudioContext||window.webkitAudioContext; actx=new AC(); }
    if(actx.state==='suspended') actx.resume(); }catch(e){ actx=null; }
}
function blip(o){
  if(!actx) return; const t=actx.currentTime;
  const osc=actx.createOscillator(), g=actx.createGain();
  osc.type=o.type||'triangle'; osc.frequency.setValueAtTime(o.f0,t);
  if(o.f1!=null) osc.frequency.exponentialRampToValueAtTime(Math.max(1,o.f1), t+o.dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(o.vol||0.18, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t+o.dur);
  osc.connect(g).connect(actx.destination); osc.start(t); osc.stop(t+o.dur+0.03);
}
function noiseHit(dur,vol,freq,q){
  if(!actx) return; const t=actx.currentTime;
  const n=Math.max(1,Math.floor(actx.sampleRate*dur)), buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);   // 감쇠 노이즈
  const src=actx.createBufferSource(); src.buffer=buf;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq||1200; bp.Q.value=q||0.8;
  const g=actx.createGain(); g.gain.value=vol||0.18;
  src.connect(bp).connect(g).connect(actx.destination); src.start(t);
}
function sfxSwing(){ noiseHit(0.10,0.16,1700,0.7); blip({type:'square',f0:440,f1:120,dur:0.10,vol:0.10}); }   // 휘두름/타격
function sfxHurt(){ blip({type:'sawtooth',f0:200,f1:55,dur:0.22,vol:0.20}); noiseHit(0.14,0.14,480,0.6); }    // 피격
function sfxLevel(){ [523,659,784,1047].forEach((f,i)=> setTimeout(()=>blip({type:'triangle',f0:f,dur:0.20,vol:0.15}), i*95)); } // 레벨업

// ===== 장비/상점 상태 (서버가 권위, 클라는 표시·의도 전송만) =====
const SLOTS = ['weapon','body','feet','head'];
const SLOT_NAME = { weapon:'무기', body:'몸통', feet:'발', head:'머리' };
let village = null, equipDefs = {}, shopKeys = [];
let myInv = [], myEquip = { weapon:null, body:null, feet:null, head:null };
let myAtk = 7, myDef = 0, mySoul = 0, nearVillage = false, openWin = null;
function statText(it){ return (it.atk?'공 +'+it.atk:'') + (it.def?'방 +'+it.def:'') || '—'; }

let msgEl=document.getElementById('msg'), msgT=null;
function say(t,k){ msgEl.style.color = k==='b'?'#a83a2f':'#c9a24b'; msgEl.textContent=t;
  clearTimeout(msgT); msgT=setTimeout(()=>msgEl.textContent='',2400); }

function enter(){
  initAudio();
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  const addr = proto + location.host;
  const nick = document.getElementById('nick').value.trim() || '무명천민';
  try{ ws = new WebSocket(addr); }
  catch(e){ document.getElementById('err').textContent='주소를 확인하세요.'; return; }
  ws.onopen = () => ws.send(JSON.stringify({ t:'join', name: nick }));
  ws.onerror = () => document.getElementById('err').textContent='연결 실패 — 서버가 켜져 있나요?';
  ws.onclose = () => { if(myId) say('서버와 연결이 끊겼다', 'b'); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if(m.t === 'welcome'){ myId = m.id; WORLD = m.world;
      village = m.village; equipDefs = m.equipDefs; shopKeys = m.shop;
      document.getElementById('setup').style.display='none';
      document.getElementById('statwin').style.display='block';
      document.getElementById('who').textContent = nick;
      say('탭=이동 · 요괴 탭=공격 · 혼 탭=줍기 · 쉬면 회복된다');
    }
    if(m.t === 'state'){
      prevState = currState; prevAt = currAt;
      currState = m; currAt = performance.now();
      document.getElementById('count').textContent = m.players.length;
      // ── 피격 감지: 직전 상태 대비 HP가 줄면 연출/사운드 트리거 ──
      const tn = performance.now();
      if(prevState){
        for(const mo of m.monsters){
          const pm = prevState.monsters.find(o=>o.id===mo.id);
          if(pm && mo.hp < pm.hp){
            monFx.set(mo.id, tn);   // 흔들림 + 번쩍임
            // 가까운 플레이어(타인)에게 휘두름 모션 부여
            let near=null, nd=ATK_RANGE*ATK_RANGE+60;
            for(const pl of m.players){ const dd=(pl.x-mo.x)*(pl.x-mo.x)+(pl.y-mo.y)*(pl.y-mo.y); if(dd<nd){nd=dd; near=pl;} }
            if(near && near.id!==myId){ swingFx.set(near.id, tn); face.set(near.id, mo.x>near.x?1:-1); }
          }
        }
        for(const pl of m.players){
          const pp = prevState.players.find(o=>o.id===pl.id);
          if(pp && pl.hp < pp.hp){   // 밀림 방향 = 가장 가까운 몬스터로부터 바깥
            let mn=null, md=1e9;
            for(const mo of m.monsters){ const dd=Math.hypot(mo.x-pl.x,mo.y-pl.y); if(dd<md){md=dd; mn=mo;} }
            let dx=0, dy=-1;
            if(mn){ const ang=Math.atan2(pl.y-mn.y, pl.x-mn.x); dx=Math.cos(ang); dy=Math.sin(ang); }
            hurtFx.set(pl.id, { start: tn, dx, dy });
            if(pl.id===myId) sfxHurt();
          }
        }
      }
      // 사라진 개체의 애니메이션 상태 정리 (메모리 누수 방지)
      const pids=new Set(m.players.map(p=>p.id)), mids=new Set(m.monsters.map(o=>o.id));
      prune(walkInfo,pids); prune(face,pids); prune(swingFx,pids); prune(hurtFx,pids); prune(monFx,mids);
      const sp = m.players.find(p => p.id === myId);
      if(sp){
        document.getElementById('lv').textContent = sp.level;
        document.getElementById('hpf').style.transform = 'scaleX('+Math.max(0,sp.hp/sp.maxHp)+')';
        document.getElementById('hpt').textContent = 'HP '+Math.max(0,sp.hp)+' / '+sp.maxHp;
        document.getElementById('mpf').style.transform = 'scaleX('+Math.max(0,sp.mp/sp.maxMp)+')';
        document.getElementById('mpt').textContent = 'MP '+sp.mp+' / '+sp.maxMp;
        document.getElementById('expf').style.transform = 'scaleX('+Math.min(1,sp.exp/sp.expNeed)+')';
        document.getElementById('expt').textContent = 'EXP '+sp.exp+' / '+sp.expNeed;
        if(!me.known){ me.x=sp.x; me.y=sp.y; me.known=true; }
        else { me.x += (sp.x-me.x)*0.18; me.y += (sp.y-me.y)*0.18; }
        if(sp.dead){ me.tx=me.ty=null; me.attackId=null; }
      }
    }
    if(m.t === 'self'){   // 본인 전용: 인벤토리·착용·실효치·魂 (서버가 변경 시에만 보냄)
      myInv = m.inv; myEquip = m.equip; myAtk = m.atk; myDef = m.def; mySoul = m.soul;
      document.getElementById('atkv').textContent = myAtk;
      document.getElementById('defv').textContent = myDef;
      document.getElementById('soulv').textContent = mySoul;
      if(openWin === 'eqwin') renderEquip();
      if(openWin === 'shopwin') refreshShop();
    }
    if(m.t === 'fx'){ effects.push({ kind:m.kind, id:m.id, level:m.level, start: performance.now() });
      if(m.kind==='levelup' && m.id===myId){ say('LEVEL UP! — Lv '+m.level, 'g'); sfxLevel(); } }
    if(m.t === 'msg') say(m.text, m.k);
  };
}

let camX=0, camY=0;
cv.addEventListener('pointerdown', e => {
  initAudio();
  if(!ws || !currState) return;
  const r = cv.getBoundingClientRect();
  const wx = e.clientX-r.left+camX, wy = e.clientY-r.top+camY;
  for(const s of currState.souls){
    if(Math.hypot(wx-s.x, wy-s.y) < 22){ ws.send(JSON.stringify({ t:'loot', id:s.id })); return; }
  }
  for(const d of (currState.drops||[])){
    if(Math.hypot(wx-d.x, wy-d.y) < 22){ ws.send(JSON.stringify({ t:'pickup', id:d.id })); return; }
  }
  for(const mo of currState.monsters){
    const r = mo.boss ? 40 : 24;
    if(Math.hypot(wx-mo.x, wy-mo.y) < r){ me.tx=me.ty=null; me.attackId=mo.id; ws.send(JSON.stringify({ t:'attack', id:mo.id })); return; }
  }
  me.tx=wx; me.ty=wy; me.attackId=null;
  ws.send(JSON.stringify({ t:'move', x:wx, y:wy }));
});

function lerpEntity(list, prevList, id){
  const c = list.find(o=>o.id===id); if(!c) return null;
  const p = prevList ? prevList.find(o=>o.id===id) : null;
  if(!p) return { ...c };
  const span = Math.max(1, currAt-prevAt);
  const t = Math.min(1, (performance.now()-currAt)/span);
  return { ...c, x: p.x+(c.x-p.x)*t, y: p.y+(c.y-p.y)*t };
}

function update(dt){
  if(me.tx !== null){
    const d = Math.hypot(me.tx-me.x, me.ty-me.y);
    if(d > 4){ me.x += (me.tx-me.x)/d*SPEED*dt; me.y += (me.ty-me.y)/d*SPEED*dt; }
    else me.tx = me.ty = null;
  }
}

function charScreenPos(id){
  if(id === myId) return { x: me.x-camX, y: me.y-camY };
  if(!currState) return null;
  const e = lerpEntity(currState.players, prevState&&prevState.players, id);
  return e ? { x: e.x-camX, y: e.y-camY } : null;
}

// ===== 전신 캐릭터 (머리/몸통/팔/다리 + 착용 장비 반영) =====
function weaponKey(equip){ return (equip && equip.weapon) || 'scythe'; }
function bodyColor(equip, isMe){
  const k = equip && equip.body;
  if(k==='armor') return '#8a929c';        // 갑주: 강철
  if(k==='leathervest') return '#6f4a2c';   // 가죽 배자: 갈색
  return isMe ? '#c9b489' : '#9aa8c0';      // 삼베옷/기본
}
function drawWeapon(key, hx, hy, ang){
  ctx.save(); ctx.translate(hx,hy); ctx.rotate(ang); ctx.lineCap='round';
  if(key==='bspear'){            // 죽창
    ctx.strokeStyle='#9a7a3a'; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(23,0); ctx.stroke();
    ctx.fillStyle='#dad9cf'; ctx.beginPath(); ctx.moveTo(23,-3); ctx.lineTo(31,0); ctx.lineTo(23,3); ctx.closePath(); ctx.fill();
  } else if(key==='hwando'){     // 환도 (곡도)
    ctx.strokeStyle='#3a2f20'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(2,0); ctx.stroke();
    ctx.strokeStyle='#cfd6de'; ctx.lineWidth=2.8;
    ctx.beginPath(); ctx.moveTo(2,0); ctx.quadraticCurveTo(16,-2,26,-10); ctx.stroke();
  } else {                       // 낫 (기본)
    ctx.strokeStyle='#6a4a2a'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(15,0); ctx.stroke();
    ctx.strokeStyle='#cfd6de'; ctx.lineWidth=2.6;
    ctx.beginPath(); ctx.moveTo(15,0); ctx.quadraticCurveTo(19,-11,7,-13); ctx.stroke();
  }
  ctx.restore();
}
function drawBody(isMe, equip, walk, moving, swing){
  const bcol = bodyColor(equip, isMe);
  const skin = isMe ? '#e0cca6' : '#c7cedd';
  const dark = isMe ? '#3a2f20' : '#2a3040';
  const gait = moving ? Math.sin(walk) : 0;
  ctx.lineCap='round';
  // 뒷팔
  ctx.strokeStyle=bcol; ctx.lineWidth=3.2;
  ctx.beginPath(); ctx.moveTo(-3.5,-8); ctx.lineTo(-5 - gait*2, 2); ctx.stroke();
  // 다리 (이동 시 교대로 내딛음)
  function leg(hx, ang){
    const len=13, fx=hx+Math.sin(ang)*len, fy=3+Math.cos(ang)*len;
    ctx.strokeStyle=dark; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(hx,3); ctx.lineTo(fx,fy); ctx.stroke();
    ctx.fillStyle = (equip && equip.feet==='leathershoe') ? '#5a3a22' : '#9a8a5a';   // 가죽신 vs 짚신
    ctx.beginPath(); ctx.ellipse(fx+1.5,fy+1,3.4,2,0,0,7); ctx.fill();
  }
  leg(-2.2, -0.12 - gait*0.55);
  leg( 2.2,  0.12 + gait*0.55);
  // 몸통
  ctx.fillStyle=bcol;
  ctx.beginPath(); ctx.moveTo(-6,-9); ctx.lineTo(6,-9); ctx.lineTo(4.6,4); ctx.lineTo(-4.6,4); ctx.closePath(); ctx.fill();
  if(equip && equip.body==='armor'){ ctx.strokeStyle='#cfd6dd'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4.6,-2); ctx.lineTo(4.6,-2); ctx.stroke(); }
  // 머리 + 상투
  ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,-14,5.5,0,7); ctx.fill();
  ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(0,-17.5,5,2.6,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-20,1.7,0,7); ctx.fill();
  // 앞팔 + 무기 (공격 모션: 치켜들었다 내려벤다)
  let arm;
  if(swing<=0) arm = 0.72 + (moving ? Math.sin(walk+Math.PI)*0.22 : 0);
  else if(swing<0.30) arm = 0.72 + (-1.5-0.72)*(swing/0.30);
  else arm = -1.5 + (1.15-(-1.5))*((swing-0.30)/0.70);
  const shx=3.5, shy=-8, hx=shx+Math.cos(arm)*11, hy=shy+Math.sin(arm)*11;
  drawWeapon(weaponKey(equip), hx, hy, arm);
  ctx.strokeStyle=bcol; ctx.lineWidth=3.2;
  ctx.beginPath(); ctx.moveTo(shx,shy); ctx.lineTo(hx,hy); ctx.stroke();
  ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(hx,hy,2,0,7); ctx.fill();
  // 삿갓
  if(equip && equip.head==='sakkat'){
    ctx.fillStyle='#bb9d5c';
    ctx.beginPath(); ctx.moveTo(-11,-14.5); ctx.lineTo(11,-14.5); ctx.lineTo(0,-24); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#7a6238'; ctx.lineWidth=1; ctx.stroke();
  }
}
function bodySil(){   // 붉은 피격 점멸용 실루엣
  ctx.beginPath();
  ctx.arc(0,-14,6,0,7);
  ctx.moveTo(-6.5,-9); ctx.lineTo(6.5,-9); ctx.lineTo(5,16); ctx.lineTo(-5,16); ctx.closePath();
  ctx.fill();
}
function drawChar(x,y,name,level,hp,maxHp,isMe,dead,a){
  a = a || {};
  ctx.save(); ctx.translate(x,y);
  const al = dead ? 0.4 : 1;
  ctx.globalAlpha = al;
  ctx.fillStyle = isMe ? '#c9a24b' : '#9aa8c0'; ctx.font='11px Georgia'; ctx.textAlign='center';
  ctx.fillText(name+' Lv'+level, 0, -29);
  ctx.save(); ctx.scale(a.facing||1, 1);
  drawBody(isMe, a.equip, a.walk||0, a.moving, a.swing||0);
  if(a.hurt>0){ ctx.globalAlpha = al*0.6*a.hurt; ctx.fillStyle='#ff4232'; bodySil(); ctx.globalAlpha = al; }
  ctx.restore();
  if(hp < maxHp){ ctx.fillStyle='#1a1410'; ctx.fillRect(-13,21,26,3);
    ctx.fillStyle='#a83a2f'; ctx.fillRect(-13,21,26*Math.max(0,hp)/maxHp,3); }
  ctx.restore(); ctx.globalAlpha = 1;
}
// 캐릭터별 애니메이션 상태(걸음 위상·방향·휘두름·피격)를 산출
function computeAnim(id, wx, wy, now, dt, isMe, equip){
  let wi = walkInfo.get(id);
  if(!wi){ wi = { wx, wy, phase:0, mt:-1e9 }; walkInfo.set(id, wi); }
  const moved = Math.hypot(wx-wi.wx, wy-wi.wy);
  if(moved > 0.3){ wi.mt = now; if(Math.abs(wx-wi.wx) > 0.25) face.set(id, wx>wi.wx ? 1 : -1); }
  const moving = (now - wi.mt) < 160;          // 상태 갱신 간 공백을 메워 다리 떨림 방지
  if(moving) wi.phase += dt*11;
  wi.wx = wx; wi.wy = wy;
  let swing = 0; const ss = swingFx.get(id);
  if(ss != null){ const p=(now-ss)/SWING_MS; if(p>=0 && p<1) swing=p; else swingFx.delete(id); }
  let hurt = 0, ox = 0, oy = 0; const hf = hurtFx.get(id);
  if(hf){ const p=1-(now-hf.start)/HURT_MS; if(p>0){ hurt=p; ox=hf.dx*7*p; oy=hf.dy*7*p; } else hurtFx.delete(id); }
  return { facing: face.get(id)||1, walk: wi.phase, moving, swing, hurt, equip, ox, oy };
}

// ===== 장비창 / 상점창 (의도만 전송, 판정은 서버) =====
function toggleWin(id){
  if(openWin === id){ closeWins(); return; }
  closeWins();
  openWin = id;
  document.getElementById(id).style.display = 'block';
  document.getElementById('eqBtn').classList.toggle('on', id==='eqwin');
  document.getElementById('shopBtn').classList.toggle('on', id==='shopwin');
  if(id === 'eqwin') renderEquip();
  if(id === 'shopwin') renderShop();
}
function closeWins(){
  openWin = null;
  document.getElementById('eqwin').style.display = 'none';
  document.getElementById('shopwin').style.display = 'none';
  document.getElementById('eqBtn').classList.remove('on');
  document.getElementById('shopBtn').classList.remove('on');
}
function renderEquip(){
  const body = document.getElementById('eqbody'); body.innerHTML = '';
  for(const slot of SLOTS){
    const eqKey = myEquip[slot];
    const owned = myInv.filter(k => equipDefs[k] && equipDefs[k].slot === slot);
    let html = '<div class="sh">'+SLOT_NAME[slot]+'</div>';
    if(!eqKey && owned.length === 0){
      html += '<div class="item"><span class="empty">— 가진 것이 없다 —</span></div>';
    }
    for(const k of owned){
      const it = equipDefs[k], on = (eqKey === k);
      html += '<div class="item '+(on?'eq':'')+'"><span><span class="nm2">'+it.name+'</span>'+
        '<span class="st">'+statText(it)+'</span></span>'+
        (on ? '<button onclick="doUnequip(\''+slot+'\')">해제</button>'
            : '<button onclick="doEquip(\''+k+'\')">착용</button>')+'</div>';
    }
    const div = document.createElement('div'); div.className = 'slot'; div.innerHTML = html;
    body.appendChild(div);
  }
}
function renderShop(){
  const body = document.getElementById('shopbody'); body.innerHTML = '';
  for(const k of shopKeys){
    const it = equipDefs[k];
    const div = document.createElement('div'); div.className = 'slot';
    div.innerHTML = '<div class="item"><span><span class="nm2">'+it.name+'</span>'+
      '<span class="st">'+SLOT_NAME[it.slot]+' · '+statText(it)+' · '+it.price+'魂</span></span>'+
      '<button id="buy_'+k+'" onclick="doBuy(\''+k+'\')">구입</button></div>';
    body.appendChild(div);
  }
  refreshShop();
}
function refreshShop(){
  if(openWin !== 'shopwin') return;
  document.getElementById('shopbal').textContent = mySoul;
  for(const k of shopKeys){
    const b = document.getElementById('buy_'+k); if(!b) continue;
    const it = equipDefs[k];
    if(myInv.includes(k)){ b.textContent = '보유'; b.disabled = true; }
    else if(!nearVillage){ b.textContent = '마을밖'; b.disabled = true; }
    else if(mySoul < it.price){ b.textContent = '魂부족'; b.disabled = true; }
    else { b.textContent = '구입'; b.disabled = false; }
  }
}
function doEquip(k){ if(ws) ws.send(JSON.stringify({ t:'equip', key:k })); }
function doUnequip(slot){ if(ws) ws.send(JSON.stringify({ t:'unequip', slot })); }
function doBuy(k){ if(ws) ws.send(JSON.stringify({ t:'buy', key:k })); }

let lastT = performance.now();
function loop(){
  const now = performance.now(), dt = Math.min(0.05,(now-lastT)/1000); lastT = now;
  update(dt);
  const VW=innerWidth, VH=innerHeight;
  camX=Math.max(0,Math.min(WORLD-VW, me.x-VW/2));
  camY=Math.max(0,Math.min(WORLD-VH, me.y-VH/2));
  if(village) nearVillage = Math.hypot(me.x-village.x, me.y-village.y) <= village.r;
  if(openWin === 'shopwin') refreshShop();
  ctx.fillStyle='#1c1812'; ctx.fillRect(0,0,VW,VH);
  ctx.strokeStyle='rgba(58,47,32,0.5)'; ctx.lineWidth=1;
  for(let gx=0; gx<=WORLD; gx+=80){ const sx=gx-camX; if(sx<-1||sx>VW+1)continue;
    ctx.beginPath(); ctx.moveTo(sx,-camY); ctx.lineTo(sx,WORLD-camY); ctx.stroke(); }
  for(let gy=0; gy<=WORLD; gy+=80){ const sy=gy-camY; if(sy<-1||sy>VH+1)continue;
    ctx.beginPath(); ctx.moveTo(-camX,sy); ctx.lineTo(WORLD-camX,sy); ctx.stroke(); }
  ctx.strokeStyle='#3a2f20'; ctx.lineWidth=3; ctx.strokeRect(-camX,-camY,WORLD,WORLD);

  // ===== 마을 (상점 안전지대) =====
  if(village){
    const vx=village.x-camX, vy=village.y-camY;
    ctx.save();
    ctx.fillStyle='rgba(120,150,90,0.06)';
    ctx.beginPath(); ctx.arc(vx,vy,village.r,0,7); ctx.fill();
    ctx.strokeStyle = nearVillage ? 'rgba(201,162,75,0.5)' : 'rgba(150,180,110,0.22)';
    ctx.lineWidth=2; ctx.setLineDash([7,7]);
    ctx.beginPath(); ctx.arc(vx,vy,village.r,0,7); ctx.stroke();
    ctx.setLineDash([]);
    // 초가집
    ctx.fillStyle='#5a4a30'; ctx.fillRect(vx-13,vy-3,26,16);
    ctx.fillStyle='#7a6238'; ctx.beginPath();
    ctx.moveTo(vx-18,vy-3); ctx.lineTo(vx,vy-19); ctx.lineTo(vx+18,vy-3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#c9a24b'; ctx.font='12px Georgia'; ctx.textAlign='center';
    ctx.fillText('마을 · 상점', vx, vy+village.r-10);
    ctx.restore();
  }

  if(currState){
    for(const s of currState.souls){
      const sx=s.x-camX, sy=s.y-camY;
      const pulse = 3+Math.sin(now/200)*1.5;
      ctx.fillStyle='#c9a24b';
      ctx.beginPath(); ctx.arc(sx,sy,5+pulse*0.4,0,7); ctx.fill();
      ctx.strokeStyle = s.locked ? '#a83a2f' : '#e8d8b8'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(sx,sy,10,0,7); ctx.stroke();
      ctx.fillStyle='#8a7d63'; ctx.font='9px Georgia'; ctx.textAlign='center';
      ctx.fillText(s.locked?'임자 있음':'魂 '+s.amount, sx, sy+22);
    }
    for(const d of (currState.drops||[])){
      const dx=d.x-camX, dy=d.y-camY;
      const bob = Math.sin(now/240 + dx)*1.5;
      ctx.save(); ctx.translate(dx,dy+bob);
      ctx.fillStyle='#7a6a48'; ctx.strokeStyle = d.locked ? '#a83a2f' : '#e8d8b8'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(6,0); ctx.lineTo(0,7); ctx.lineTo(-6,0); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = d.locked ? '#a87a6a' : '#cdbb8c'; ctx.font='9px Georgia'; ctx.textAlign='center';
      const nm = (equipDefs[d.key] && equipDefs[d.key].name) || '?';
      ctx.fillText(d.locked ? '임자 있음' : nm, 0, 19);
      ctx.restore();
    }
    for(const mo of currState.monsters){
      const e = lerpEntity(currState.monsters, prevState&&prevState.monsters, mo.id);
      let mx=e.x-camX, my=e.y-camY;
      // 피격 점멸 타이머는 화면 밖이어도 만료시킨다
      let flash=0; const mf=monFx.get(mo.id);
      if(mf!=null){ const p=1-(now-mf)/HIT_MS; if(p>0) flash=p; else monFx.delete(mo.id); }
      if(mx<-60||my<-60||mx>VW+60||my>VH+60) continue;
      if(flash>0){ mx+=Math.sin(now/16)*3*flash; my+=Math.cos(now/21)*2*flash; }   // 흔들림
      const boss = mo.boss, base = boss ? 22 : (8+mo.tier*3);
      ctx.save(); ctx.translate(mx,my);
      ctx.fillStyle = boss ? '#3a1626' : (mo.tier===3?'#8a3a4a':mo.tier===2?'#6e4a3a':'#4a5a3a');
      ctx.beginPath();
      for(let i=0;i<7;i++){ const a=i/7*Math.PI*2; const rr=base*(0.85+0.25*Math.sin(a*3+now/300));
        i===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
      ctx.closePath(); ctx.fill();
      if(flash>0){ ctx.save(); ctx.globalAlpha=0.78*flash; ctx.fillStyle='#fff'; ctx.fill(); ctx.restore(); }
      if(boss){ ctx.strokeStyle='#d86a7a'; ctx.lineWidth=2; ctx.stroke(); }
      const er = boss ? 2.8 : 1.6, ex = boss ? 5 : 3;
      ctx.fillStyle = boss ? '#ffcf6a' : '#e8d8b8';
      ctx.beginPath(); ctx.arc(-ex,-2,er,0,7); ctx.arc(ex,-2,er,0,7); ctx.fill();
      ctx.restore();
      if(boss){ ctx.fillStyle='#d86a7a'; ctx.font='bold 12px Georgia'; ctx.textAlign='center';
        ctx.fillText('鬼將', mx, my-base-12); }
      if(mo.hp<mo.maxHp){ const w = boss?48:24, by = my-base-7;
        ctx.fillStyle='#1a1410'; ctx.fillRect(mx-w/2,by,w,3);
        ctx.fillStyle = boss?'#d8402f':'#a83a2f'; ctx.fillRect(mx-w/2,by,w*Math.max(0,mo.hp)/mo.maxHp,3); }
    }
    for(const pl of currState.players){
      if(pl.id === myId) continue;
      const e = lerpEntity(currState.players, prevState&&prevState.players, pl.id);
      const a = computeAnim(pl.id, e.x, e.y, now, dt, false, null);
      drawChar(e.x-camX+a.ox, e.y-camY+a.oy, pl.name, pl.level, pl.hp, pl.maxHp, false, pl.dead, a);
    }
    const sp = currState.players.find(p=>p.id===myId);
    if(sp){
      if(me.attackId){   // 사거리 안에서 일정 간격으로 휘두름 + 타격음
        const tg = currState.monsters.find(x=>x.id===me.attackId);
        if(!tg) me.attackId = null;
        else if(Math.hypot(tg.x-me.x, tg.y-me.y) <= ATK_RANGE && now-myLastSwing >= ATTACK_CD){
          myLastSwing = now; swingFx.set(myId, now); sfxSwing();
        }
      }
      const a = computeAnim(myId, me.x, me.y, now, dt, true, myEquip);
      if(me.attackId){ const tg=currState.monsters.find(x=>x.id===me.attackId);
        if(tg){ const f=tg.x>me.x?1:-1; a.facing=f; face.set(myId,f); } }
      drawChar(me.x-camX+a.ox, me.y-camY+a.oy, sp.name, sp.level, sp.hp, sp.maxHp, true, sp.dead, a);
    }
  }

  // ===== 레벨업 연출: 황금 고리 + 솟는 글자 =====
  for(let i=effects.length-1; i>=0; i--){
    const fx = effects[i];
    const t = (now - fx.start)/1200; // 1.2초
    if(t >= 1){ effects.splice(i,1); continue; }
    const pos = charScreenPos(fx.id);
    if(!pos) continue;
    if(fx.kind === 'levelup'){
      ctx.save();
      ctx.globalAlpha = 1-t;
      // 퍼지는 황금 고리 두 겹
      ctx.strokeStyle = '#e8c860'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, 14+t*46, 0, 7); ctx.stroke();
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, 8+t*30, 0, 7); ctx.stroke();
      // 솟아오르는 빛 기둥
      const grad = ctx.createLinearGradient(pos.x, pos.y-70, pos.x, pos.y+14);
      grad.addColorStop(0, 'rgba(232,200,96,0)');
      grad.addColorStop(0.6, 'rgba(232,200,96,'+(0.35*(1-t))+')');
      grad.addColorStop(1, 'rgba(232,200,96,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(pos.x-13, pos.y-70, 26, 84);
      // LEVEL UP 글자
      ctx.fillStyle = '#f0dc8c';
      ctx.font = 'bold 15px Georgia'; ctx.textAlign='center';
      ctx.fillText('LEVEL UP', pos.x, pos.y - 32 - t*22);
      ctx.font = '11px Georgia';
      ctx.fillText('Lv '+fx.level, pos.x, pos.y - 16 - t*22);
      ctx.restore();
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
